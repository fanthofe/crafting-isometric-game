<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kaimana</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/hud.css">
<link rel="stylesheet" href="css/inventory.css">
<link rel="stylesheet" href="css/tooltip.css">
<link rel="stylesheet" href="css/controls.css">
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <h1>KAIMANA</h1>
  <p>Flèches / ZQSD : marcher · E : action / embarquer / pêcher · I : inventaire · F : poser un feu</p>
  <p id="meteo"></p>
</div>
<div id="bar"></div>

<div id="inv">
  <div id="invHeader">
    <span id="invTitle">KAIMANA</span>
    <div id="invTabs">
      <button class="itab active" data-tab="inv">INV</button>
      <button class="itab" data-tab="craft">CRAFT</button>
      <button class="itab" data-tab="skills">SKILLS</button>
    </div>
    <button id="closeInv">✕</button>
  </div>
  <div class="itabpanel" data-panel="inv">
    <div id="invBody">
      <div id="equipCol">
        <div id="equipRow"></div>
        <div id="statsRow"></div>
      </div>
      <div id="invRight">
        <div id="grid"></div>
        <div id="weightRow"><span>⚖</span><div id="weightBar"><div id="weightFill"></div></div><span id="weightTxt"></span></div>
        <div id="dropZone">🗑 Jeter l'objet tenu</div>
      </div>
    </div>
  </div>
  <div class="itabpanel" data-panel="craft" style="display:none">
    <div id="craftFilters"></div>
    <div id="invRecipes"></div>
  </div>
  <div class="itabpanel" data-panel="skills" style="display:none">
    <div id="skills"></div>
  </div>
  <div class="hint">Clic : prendre / poser · Clic droit : moitié · Double-clic : utiliser / équiper</div>
</div>
<div id="held"><span class="ic"></span><span class="q"></span></div>
<div id="tip"></div>

<div id="dpad">
  <div class="db empty"></div><div class="db" data-d="up">▲</div><div class="db empty"></div>
  <div class="db" data-d="left">◀</div><div class="db empty"></div><div class="db" data-d="right">▶</div>
  <div class="db empty"></div><div class="db" data-d="down">▼</div><div class="db empty"></div>
</div>
<div id="touchBtns">
  <button class="tb" id="btnAct">🪓</button>
  <button class="tb" id="btnInv">🎒</button>
</div>

<!-- Ordre de chargement = ordre de dépendance (portée globale partagée, pas de modules). -->
<script src="js/core/config.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/data/items.js"></script>
<script src="js/data/skills.js"></script>
<script src="js/data/recipes.js"></script>
<script src="js/world/map-gen.js"></script>
<script src="js/world/map-decor.js"></script>
<script src="js/entities/player.js"></script>
<script src="js/entities/inventory.js"></script>
<script src="js/entities/animals.js"></script>
<script src="js/entities/fish.js"></script>
<script src="js/entities/sea-predators.js"></script>
<script src="js/entities/kobolds.js"></script>
<script src="js/entities/spirits.js"></script>
<script src="js/render/tiles.js"></script>
<script src="js/render/decor.js"></script>
<script src="js/render/entities.js"></script>
<script src="js/render/hero.js"></script>
<script src="js/render/icons.js"></script>
<script src="js/render/effects.js"></script>
<script src="js/world/map-logic.js"></script>
<script src="js/ui/hud.js"></script>
<script src="js/ui/inventory-ui.js"></script>
<script src="js/ui/skills-ui.js"></script>
<script src="js/ui/tooltip.js"></script>
<script src="js/input.js"></script>
<script src="js/input/gamepad.js"></script>
<script src="js/combat.js"></script>
<script src="js/game.js"></script>
</body>
</html>
