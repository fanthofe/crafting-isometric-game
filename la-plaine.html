<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>La Plaine — petit jeu isométrique</title>
<style>
  :root{
    --sky-top:#a8dcec;
    --sky-bottom:#e7f3cf;
    --ink:#2b3a2e;
    --panel:#fdf6e3;
    --panel-border:#8a6240;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    background:linear-gradient(var(--sky-top),var(--sky-bottom));
    display:flex;align-items:center;justify-content:center;
    font-family:"Courier New",ui-monospace,monospace;
    -webkit-user-select:none;user-select:none;
    touch-action:none;
  }
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  #hud{
    position:fixed;top:10px;left:12px;color:var(--ink);
    text-shadow:0 1px 0 rgba(255,255,255,.6);pointer-events:none;
  }
  #hud h1{font-size:18px;letter-spacing:3px;font-weight:700}
  #hud p{font-size:11px;letter-spacing:1px;opacity:.75;margin-top:2px}
  /* Barre de ressources */
  #bar{
    position:fixed;top:10px;right:12px;display:flex;gap:6px;pointer-events:none;
  }
  .slot{
    background:rgba(253,246,227,.85);border:2px solid var(--panel-border);
    border-radius:6px;min-width:46px;padding:3px 6px;text-align:center;
    color:var(--ink);font-size:11px;line-height:1.2;
  }
  .slot .sw{display:inline-block;width:14px;height:14px;vertical-align:-3px;margin-right:3px;
    background-size:contain;background-repeat:no-repeat;image-rendering:pixelated}
  /* Panneau inventaire / craft */
  #inv{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--panel);border:3px solid var(--panel-border);border-radius:10px;
    padding:14px 16px;min-width:270px;max-width:92vw;color:var(--ink);
    box-shadow:0 8px 0 rgba(43,58,46,.25);display:none;z-index:10;
  }
  #inv.open{display:block}
  #inv h2{font-size:14px;letter-spacing:2px;border-bottom:2px solid var(--panel-border);
    padding-bottom:6px;margin-bottom:8px}
  #inv h3{font-size:12px;letter-spacing:1px;margin:10px 0 6px;opacity:.8}
  .itemrow{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0}
  .itemrow .sw{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,.25)}
  .itemrow .qty{margin-left:auto;font-weight:700}
  .recipe{display:flex;align-items:center;gap:8px;font-size:11px;padding:4px 0}
  .recipe button{
    margin-left:auto;font-family:inherit;font-size:11px;font-weight:700;
    background:#79c061;border:2px solid #3f8f4f;border-radius:6px;
    padding:3px 8px;color:#1d3a22;cursor:pointer;
  }
  .recipe button:disabled{background:#d7d2c0;border-color:#a9a392;color:#8a8576;cursor:default}
  /* Grille d'inventaire façon Valheim */
  #grid{display:grid;grid-template-columns:repeat(6,42px);gap:5px;margin:8px 0 4px}
  .islot{
    width:42px;height:42px;position:relative;cursor:pointer;
    background:rgba(43,58,46,.08);border:2px solid #c9b896;border-radius:6px;
  }
  .islot:hover{border-color:var(--panel-border);background:rgba(43,58,46,.16)}
  .islot .ic{position:absolute;left:7px;top:7px;width:24px;height:24px;
    background-size:contain;background-repeat:no-repeat;image-rendering:pixelated}
  .islot .q{position:absolute;right:3px;bottom:1px;font-size:10px;font-weight:700;color:var(--ink);
    text-shadow:0 1px 0 rgba(255,255,255,.6)}
  #weightRow{font-size:11px;margin:6px 0 2px;display:flex;align-items:center;gap:8px}
  #weightBar{flex:1;height:8px;background:rgba(43,58,46,.15);border:1px solid var(--panel-border);
    border-radius:4px;overflow:hidden}
  #weightFill{height:100%;background:#79c061;width:0}
  #dropZone{margin-top:6px;font-size:11px;text-align:center;padding:5px;
    border:2px dashed #c9b896;border-radius:6px;cursor:pointer;opacity:.85}
  #dropZone:hover{border-color:var(--panel-border)}
  .hint{font-size:10px;opacity:.55;margin-top:8px;line-height:1.5}
  /* Compétences */
  .skrow{display:flex;align-items:center;gap:8px;font-size:11px;padding:3px 0}
  .skrow .skname{min-width:82px}
  .skrow .sklvl{font-weight:700;white-space:nowrap;min-width:44px;text-align:right}
  .skbar{flex:1;height:7px;background:rgba(43,58,46,.15);border:1px solid var(--panel-border);
    border-radius:4px;overflow:hidden}
  .skfill{height:100%;background:#e3b95c}
  /* Équipement */
  #equipRow{display:flex;gap:12px;margin:8px 0 2px}
  .eqwrap{display:flex;flex-direction:column;align-items:center;gap:2px;
    font-size:9px;letter-spacing:1px;opacity:.9}
  .eqslot{border-color:#8a6240;background:rgba(138,98,64,.10)}
  .eqslot.filled{background:rgba(138,98,64,.22)}
  #statsRow{font-size:11px;margin:6px 0 2px;display:flex;gap:14px;flex-wrap:wrap}
  #statsRow b{color:#6f4c30}
  #held{position:fixed;pointer-events:none;z-index:50;display:none}
  #held .ic{display:block;width:24px;height:24px;background-size:contain;background-repeat:no-repeat;image-rendering:pixelated}
  #held .q{position:absolute;right:-6px;bottom:-6px;font-size:10px;font-weight:700;
    color:#fff;text-shadow:0 0 3px #000,0 0 3px #000}
  #tip{
    position:fixed;pointer-events:none;z-index:60;display:none;max-width:210px;
    background:rgba(30,40,30,.93);color:#f3eeda;font-size:11px;line-height:1.5;
    padding:6px 9px;border-radius:6px;border:1px solid var(--panel-border);
  }
  #tip b{color:#ffd98a}
  #closeInv{position:absolute;top:8px;right:10px;background:none;border:none;
    font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit}
  /* Contrôles tactiles */
  #dpad{
    position:fixed;left:18px;bottom:18px;display:none;
    grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:4px;
  }
  #touchBtns{position:fixed;right:18px;bottom:24px;display:none;flex-direction:column;gap:10px}
  @media (pointer:coarse){ #dpad{display:grid} #touchBtns{display:flex} #hud p{display:none} }
  .db{
    background:rgba(43,58,46,.18);border:2px solid rgba(43,58,46,.35);
    border-radius:10px;color:var(--ink);font-size:20px;
    display:flex;align-items:center;justify-content:center;touch-action:none;
  }
  .db:active{background:rgba(43,58,46,.35)}
  .db.empty{visibility:hidden}
  .tb{
    width:58px;height:58px;border-radius:50%;font-size:24px;
    background:rgba(253,246,227,.85);border:2px solid var(--panel-border);
    display:flex;align-items:center;justify-content:center;touch-action:none;
  }
  .tb:active{background:rgba(228,205,160,.95)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <h1>LA PLAINE</h1>
  <p>Flèches / ZQSD : marcher · E ou Espace : couper / cueillir / chasser · I : inventaire · F : poser un feu</p>
  <p id="meteo"></p>
</div>
<div id="bar"></div>

<div id="inv">
  <button id="closeInv">✕</button>
  <h2>INVENTAIRE</h2>
  <div id="grid"></div>
  <div id="weightRow"><span>⚖</span><div id="weightBar"><div id="weightFill"></div></div><span id="weightTxt"></span></div>
  <div id="dropZone">🗑 Jeter au sol l'objet tenu</div>
  <h3>ÉQUIPEMENT</h3>
  <div id="equipRow"></div>
  <div id="statsRow"></div>
  <h3>COMPÉTENCES</h3>
  <div id="skills"></div>
  <h3>FABRICATION</h3>
  <div id="invRecipes"></div>
  <div class="hint">Clic : prendre / poser · Clic droit : moitié / un seul · Double-clic : manger / équiper</div>
</div>
<div id="held"><span class="ic"></span><span class="q"></span></div>
<div id="tip"></div>

<div id="dpad">
  <div class="db empty"></div><div class="db" data-d="up">▲</div><div class="db empty"></div>
  <div class="db" data-d="left">◀</div><div class="db empty"></div><div class="db" data-d="right">▶</div>
  <div class="db empty"></div><div class="db" data-d="down">▼</div><div class="db empty"></div>
</div>
<div id="touchBtns">
  <button class="tb" id="btnAct">🪓</button>
  <button class="tb" id="btnInv">🎒</button>
</div>

<script>
"use strict";
/* ====================== Réglages ====================== */
const TW = 32, TH = 16;
const MAP = 96;                  // une grande île
const LW = 432, LH = 270;
const SPEED = 3.4;
const REACH = 1.35;          // portée de l'action
const SWING_TIME = 0.3;      // durée d'un coup

const cv = document.getElementById("game");
const cx = cv.getContext("2d");
cv.width = LW; cv.height = LH;
cx.imageSmoothingEnabled = false;

function fit(){
  const s = Math.max(1, Math.floor(Math.min(innerWidth/LW, innerHeight/LH)));
  cv.style.width = (LW*s)+"px";
  cv.style.height = (LH*s)+"px";
}
addEventListener("resize", fit); fit();

/* ============ Aléatoire déterministe ============ */
let seed = 20260610;
function rnd(){ seed = (seed*1664525 + 1013904223) >>> 0; return seed/4294967296; }

/* ====================== Carte : une grande île ====================== */
/* sols : 0-2 herbe · 3 eau · 4 sable */
const ground = [], blocked = [];
for(let y=0;y<MAP;y++){ ground.push(new Array(MAP).fill(3)); blocked.push(new Array(MAP).fill(true)); }
const phA=rnd()*6.28, phB=rnd()*6.28, phC=rnd()*6.28;
function islandR(ang){            // rayon de la côte, irrégulier selon l'angle
  return 0.80 + 0.10*Math.sin(ang*3+phA) + 0.06*Math.sin(ang*5+phB) + 0.04*Math.sin(ang*8+phC);
}
for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++){
  const dx=(x-MAP/2+0.5)/(MAP/2), dy=(y-MAP/2+0.5)/(MAP/2);
  const d=Math.hypot(dx,dy), ang=Math.atan2(dy,dx);
  const r=islandR(ang);
  if(d>r) continue;                                        // océan
  blocked[y][x]=false;
  if(d>r-0.07){ ground[y][x]=4; }                          // plage de sable
  else { const g=rnd(); ground[y][x] = g<0.62?0 : g<0.86?1 : 2; }
}
// quelques lacs intérieurs
for(let i=0;i<4;i++){
  const lx=MAP*0.25+rnd()*MAP*0.5, ly=MAP*0.25+rnd()*MAP*0.5, lr=1.8+rnd()*2.6;
  if(Math.hypot(lx-MAP/2, ly-MAP/2)<6) continue;           // pas sur le camp de départ
  for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++){
    if(ground[y][x]>=3) continue;
    if(Math.hypot(x-lx, y-ly) < lr+(rnd()-0.5)*0.8){ ground[y][x]=3; blocked[y][x]=true; }
  }
}

const decor = [];
const spawn = {x:MAP/2+0.5, y:MAP/2+0.5};
function freeSpot(minDistSpawn){
  for(let tries=0;tries<200;tries++){
    const x = 1+Math.floor(rnd()*(MAP-2)), y = 1+Math.floor(rnd()*(MAP-2));
    if(blocked[y][x] || ground[y][x]>=3) continue;          // ni eau ni sable
    if(Math.hypot(x+0.5-spawn.x, y+0.5-spawn.y) < minDistSpawn) continue;
    if(decor.some(d=>d.tx===x && d.ty===y)) continue;
    return {x,y};
  }
  return null;
}
for(let i=0;i<150;i++){ const s=freeSpot(3.5); if(s){ decor.push({type:"tree", tx:s.x, ty:s.y, v:Math.floor(rnd()*7), alive:true, hp:3, regrow:0, shake:0}); blocked[s.y][s.x]=true; } }
for(let i=0;i<60;i++){ const s=freeSpot(2.5); if(s){ decor.push({type:"rock", tx:s.x, ty:s.y, v:Math.floor(rnd()*2), alive:true, hp:2, regrow:0, shake:0}); blocked[s.y][s.x]=true; } }
// arbres fruitiers : 5 de chaque sorte (pommier / prunier / cerisier / poirier / oranger / pêcher)
for(let k=0;k<6;k++)for(let i=0;i<5;i++){
  const s=freeSpot(3);
  if(s){ decor.push({type:"fruittree", tx:s.x, ty:s.y, kind:k, fruits:3, regrowF:0, shake:0}); blocked[s.y][s.x]=true; }
}
const FLOWER_COLORS = ["#e85f6a","#f4c542","#bfe3ff","#c77ddb"];
for(let i=0;i<300;i++){ const s=freeSpot(0); if(s) decor.push({type:"flower", tx:s.x, ty:s.y, c:FLOWER_COLORS[Math.floor(rnd()*4)], ph:rnd()*6.28, ox:(rnd()-0.5)*14, oy:(rnd()-0.5)*5}); }
for(let i=0;i<420;i++){ const s=freeSpot(0); if(s) decor.push({type:"tuft", tx:s.x, ty:s.y, ph:rnd()*6.28, ox:(rnd()-0.5)*16, oy:(rnd()-0.5)*6}); }

/* ====================== Inventaire & craft (façon Valheim) ====================== */
const ITEMS = {
  bois:      {name:"Bois",             c:"#8a6240", stack:50, w:2},
  pierre:    {name:"Pierre",           c:"#9aa2a6", stack:50, w:4},
  planche:   {name:"Planche",          c:"#d2a763", stack:50, w:1.5},
  feu:       {name:"Feu de camp",      c:"#e8743f", stack:5,  w:6},
  pomme:     {name:"Pomme",            c:"#e0463f", stack:20, w:0.5, food:8},
  prune:     {name:"Prune",            c:"#8e5bc8", stack:20, w:0.5, food:8},
  cerise:    {name:"Cerise",           c:"#c22b48", stack:20, w:0.3, food:6},
  poire:     {name:"Poire",            c:"#c9c440", stack:20, w:0.5, food:8},
  orange:    {name:"Orange",           c:"#f08c1d", stack:20, w:0.5, food:10},
  peche:     {name:"Pêche",            c:"#f2a07b", stack:20, w:0.5, food:10},
  salade:    {name:"Salade de fruits", c:"#f4a3b8", stack:10, w:1,   food:20},
  viande:    {name:"Viande",           c:"#b5483a", stack:20, w:1},
  cuir:      {name:"Cuir",             c:"#a3754d", stack:30, w:1},
  plume:     {name:"Plume",            c:"#e8e4da", stack:30, w:0.1},
  brochette: {name:"Brochette",        c:"#d97f5e", stack:10, w:1,   food:16},
  hache_pierre: {name:"Hache de pierre",   c:"#9aa2a6", stack:1, w:3,   equip:"arme",  bonus:"+1 dégât de bûcheron"},
  lance:        {name:"Lance",             c:"#c4cacd", stack:1, w:2.5, equip:"arme",  bonus:"+1 dégât de chasse"},
  chapeau:      {name:"Chapeau de plumes", c:"#e8e4da", stack:1, w:1,   equip:"tete",  def:1, bonus:"défense +1 · les animaux fuient moins loin"},
  tunique:      {name:"Tunique de cuir",   c:"#a3754d", stack:1, w:4,   equip:"torse", def:2, bonus:"défense +2 · +25 de charge max"},
  bottes:       {name:"Bottes de cuir",    c:"#7c5836", stack:1, w:2,   equip:"pieds", def:1, bonus:"défense +1 · +15% de vitesse"},
  os:              {name:"Os",               c:"#ddd8c8", stack:30, w:0.5},
  griffe:          {name:"Griffe de kobold", c:"#8ab0c0", stack:10, w:0.3},
  fourrure_lunaire:{name:"Fourrure lunaire", c:"#7080b0", stack:5,  w:1.5},
  plume_noire:     {name:"Plume noire",      c:"#2e2e42", stack:30, w:0.1},
  torche:          {name:"Torche",           c:"#e8a030", stack:10, w:0.8},
  dague:           {name:"Dague de griffes", c:"#8ab0c0", stack:1,  w:1.5, equip:"arme", def:0, bonus:"+2 dégâts · attaque rapide contre les kobolds"},
};

/* ---------- Compétences (montent en pratiquant, comme dans Valheim) ---------- */
const SKILLS = {
  bucheron:  {name:"Bûcheron",   xp:0, lvl:1},
  cueillette:{name:"Cueillette", xp:0, lvl:1},
  chasse:    {name:"Chasse",     xp:0, lvl:1},
};
function xpNeed(lvl){ return 8 + lvl*6; }
function gainXP(id, n){
  const s = SKILLS[id];
  s.xp += n;
  while(s.xp >= xpNeed(s.lvl)){
    s.xp -= xpNeed(s.lvl); s.lvl++;
    const ps = toScreen(player.x, player.y);
    floats.push({sx:ps.x, sy:ps.y-28, t:1.8, str:`${s.name} niveau ${s.lvl} !`, c:"#b8860b"});
    burst(ps.x, ps.y-12, "#f4c542", 12);
  }
  if(elInv.classList.contains("open")) refreshUI();
}
const SLOT_COUNT = 24;
const MAX_WEIGHT = 80;
const slots = new Array(SLOT_COUNT).fill(null);   // chaque slot : {id, qty} ou null
let held = null;                                  // pile tenue à la souris
let boostT = 0;                                   // bonus de vitesse après avoir mangé
const equip = {arme:null, tete:null, torse:null, pieds:null};   // équipement porté
function hasEquip(k, id){ return equip[k] && equip[k].id===id; }
/* ---------- Force & défense (arme + armure + compétences) ---------- */
function statForce(){      // dégâts par coup sur les animaux / kobolds
  return 1 + Math.floor((SKILLS.chasse.lvl-1)/4)
    + (hasEquip("arme","lance") ? 1 : 0)
    + (hasEquip("arme","dague") ? 2 : 0);
}
function statForceBois(){  // dégâts par coup sur les arbres
  return 1 + Math.floor((SKILLS.bucheron.lvl-1)/4) + (hasEquip("arme","hache_pierre") ? 1 : 0);
}
function statDefense(){    // réduit les dégâts reçus
  let d = 0;
  for(const k in equip) if(equip[k]) d += ITEMS[equip[k].id].def || 0;
  return d;
}

function countItem(id){ return slots.reduce((n,s)=> n + (s && s.id===id ? s.qty : 0), 0); }
function totalWeight(){
  let w = slots.reduce((n,s)=> n + (s ? s.qty*ITEMS[s.id].w : 0), 0);
  if(held) w += held.qty*ITEMS[held.id].w;
  for(const k in equip) if(equip[k]) w += ITEMS[equip[k].id].w;
  return w;
}
function maxWeight(){ return MAX_WEIGHT + (equip.torse ? 25 : 0); }
function overweight(){ return totalWeight() > maxWeight(); }
function addItem(id, qty){            // retourne la quantité qui n'a pas tenu
  const max = ITEMS[id].stack;
  for(const s of slots){              // compléter d'abord les piles existantes
    if(qty<=0) break;
    if(s && s.id===id && s.qty<max){ const m=Math.min(qty, max-s.qty); s.qty+=m; qty-=m; }
  }
  for(let i=0;i<SLOT_COUNT && qty>0;i++){
    if(!slots[i]){ const m=Math.min(qty,max); slots[i]={id, qty:m}; qty-=m; }
  }
  return qty;
}
function removeItem(id, qty){
  if(countItem(id)<qty) return false;
  for(let i=SLOT_COUNT-1;i>=0 && qty>0;i--){
    const s=slots[i];
    if(s && s.id===id){ const m=Math.min(qty,s.qty); s.qty-=m; qty-=m; if(s.qty<=0) slots[i]=null; }
  }
  return true;
}

/* ---------- Objets posés au sol ---------- */
const groundItems = []; // {id, qty, x, y, ph, cool}
function dropOnGround(id, qty){
  groundItems.push({
    id, qty,
    x: player.x+(Math.random()-0.5)*0.9,
    y: player.y+(Math.random()-0.5)*0.9,
    ph: Math.random()*6.28, cool: 1.4,
  });
}

const RECIPES = [
  {id:"planche",   label:"Planche",          cost:{bois:2},                     gives:{planche:1}},
  {id:"feu",       label:"Feu de camp",      cost:{planche:2, pierre:2},        gives:{feu:1}},
  {id:"salade",    label:"Salade de fruits", cost:{pomme:1, prune:1, cerise:1}, gives:{salade:1}},
  {id:"brochette", label:"Brochette",        cost:{viande:1, bois:1},           gives:{brochette:1}},
  {id:"hache_pierre", label:"Hache de pierre",   cost:{bois:3, pierre:2},          gives:{hache_pierre:1}},
  {id:"lance",        label:"Lance",             cost:{bois:2, pierre:1, plume:1}, gives:{lance:1}},
  {id:"chapeau",      label:"Chapeau de plumes", cost:{plume:4, cuir:1},           gives:{chapeau:1}},
  {id:"tunique",      label:"Tunique de cuir",   cost:{cuir:4},                    gives:{tunique:1}},
  {id:"bottes",       label:"Bottes de cuir",    cost:{cuir:2},                    gives:{bottes:1}},
  {id:"torche",       label:"Torche",            cost:{bois:1, cuir:1},            gives:{torche:3}},
  {id:"dague",        label:"Dague de griffes",  cost:{griffe:2, planche:1},       gives:{dague:1}},
];
function canCraft(r){ return Object.entries(r.cost).every(([k,n])=>countItem(k)>=n); }
function craft(r){
  if(!canCraft(r)) return;
  for(const [k,n] of Object.entries(r.cost)) removeItem(k,n);
  for(const [k,n] of Object.entries(r.gives)){
    const left = addItem(k,n);
    if(left>0) dropOnGround(k,left);
  }
  refreshUI();
}
function costText(cost){
  return Object.entries(cost).map(([k,n])=>`${n} ${ITEMS[k].name.toLowerCase()}`).join(" + ");
}

/* ---------- Interface DOM ---------- */
const elBar = document.getElementById("bar");
const elMeteo = document.getElementById("meteo");
const elInv = document.getElementById("inv");
const elGrid = document.getElementById("grid");

// construit la grille une fois ; refreshUI ne fait que mettre à jour le contenu
for(let i=0;i<SLOT_COUNT;i++){
  const d = document.createElement("div");
  d.className = "islot"; d.dataset.i = i;
  elGrid.appendChild(d);
}
function slotAt(e){ const c = e.target.closest(".islot"); return c ? +c.dataset.i : -1; }
elGrid.addEventListener("click", e=>{ const i=slotAt(e); if(i>=0) onSlot(i,false); });
elGrid.addEventListener("contextmenu", e=>{ const i=slotAt(e); if(i>=0){ e.preventDefault(); onSlot(i,true); } });
elGrid.addEventListener("dblclick", e=>{ const i=slotAt(e); if(i>=0) useSlot(i); });
elGrid.addEventListener("mouseover", e=>{ const i=slotAt(e); if(i>=0) showTip(i); });
elGrid.addEventListener("mouseout", ()=>{ elTip.style.display="none"; });

function onSlot(i, right){
  const s = slots[i];
  if(!held){
    if(!s) return;
    if(right){          // clic droit : prendre la moitié
      const take = Math.ceil(s.qty/2);
      held = {id:s.id, qty:take};
      s.qty -= take; if(s.qty<=0) slots[i]=null;
    } else { held = s; slots[i]=null; }
  } else {
    if(!s){
      if(right){        // clic droit : poser un seul
        slots[i] = {id:held.id, qty:1};
        held.qty--; if(held.qty<=0) held=null;
      } else { slots[i]=held; held=null; }
    } else if(s.id===held.id){
      const can = Math.min(right?1:held.qty, ITEMS[s.id].stack - s.qty);
      s.qty += can; held.qty -= can;
      if(held.qty<=0) held=null;
    } else if(!right){  // échange
      slots[i]=held; held=s;
    }
  }
  refreshUI(); updateHeld(); showTip(i);
}
function useSlot(i){
  const s = slots[i]; if(!s) return;
  if(ITEMS[s.id].food) eatSlot(i);
  else if(ITEMS[s.id].equip) equipFromGrid(i);
}
function equipFromGrid(i){
  const s = slots[i];
  const k = ITEMS[s.id].equip;
  const cur = equip[k];
  equip[k] = {id:s.id, qty:1};
  s.qty--; if(s.qty<=0){ slots[i]=null; elTip.style.display="none"; }
  if(cur){ const left = addItem(cur.id, 1); if(left>0) dropOnGround(cur.id, 1); }
  const ps = toScreen(player.x, player.y);
  floats.push({sx:ps.x, sy:ps.y-24, t:1.2, str:`${ITEMS[equip[k].id].name} équipé(e)`, c:"#5f4128"});
  refreshUI();
}
function eatSlot(i){
  const s = slots[i];
  if(!s || !ITEMS[s.id].food) return;
  const dur = ITEMS[s.id].food;
  s.qty--; if(s.qty<=0){ slots[i]=null; elTip.style.display="none"; }
  boostT = Math.max(boostT, dur);
  player.hp = Math.min(player.maxHp, player.hp+2);
  const ps = toScreen(player.x, player.y);
  floats.push({sx:ps.x, sy:ps.y-24, t:1.3, str:"miam ! +vitesse +♥", c:"#c0473f"});
  refreshUI();
}
function showTip(i){
  const s = slots[i];
  if(!s){ elTip.style.display="none"; return; }
  const it = ITEMS[s.id];
  elTip.innerHTML = `<b>${it.name}</b> × ${s.qty}<br>Poids : ${(it.w*s.qty).toFixed(1)} (${it.w}/u) · Pile max : ${it.stack}`
    + (it.food ? `<br><i>Double-clic pour manger (+vitesse ${it.food}s · +1 ♥)</i>` : "")
    + (it.equip ? `<br>${it.bonus}<br><i>Double-clic pour équiper</i>` : "");
  elTip.style.display = "block";
}

/* ---------- Emplacements d'équipement ---------- */
const elEquip = document.getElementById("equipRow");
const EQUIP_SLOTS = [
  {key:"arme",  label:"ARME"},
  {key:"tete",  label:"TÊTE"},
  {key:"torse", label:"TORSE"},
  {key:"pieds", label:"PIEDS"},
];
for(const es of EQUIP_SLOTS){
  const wrap = document.createElement("div"); wrap.className="eqwrap";
  wrap.innerHTML = `<div class="islot eqslot" data-k="${es.key}"></div><span>${es.label}</span>`;
  elEquip.appendChild(wrap);
}
function eqKeyAt(e){ const c = e.target.closest(".eqslot"); return c ? c.dataset.k : null; }
elEquip.addEventListener("click", e=>{ const k=eqKeyAt(e); if(k) onEquipSlot(k); });
elEquip.addEventListener("dblclick", e=>{ const k=eqKeyAt(e); if(k) unequipSlot(k); });
elEquip.addEventListener("mouseover", e=>{ const k=eqKeyAt(e); if(k) showEquipTip(k); });
elEquip.addEventListener("mouseout", ()=>{ elTip.style.display="none"; });

function onEquipSlot(k){
  const cur = equip[k];
  if(held){
    if(ITEMS[held.id].equip!==k) return;          // mauvais emplacement
    if(held.qty===1){ equip[k]={id:held.id, qty:1}; held = cur; }
    else if(!cur){ equip[k]={id:held.id, qty:1}; held.qty--; }
  } else if(cur){
    held = cur; equip[k]=null;
  }
  refreshUI(); updateHeld();
}
function unequipSlot(k){
  const cur = equip[k]; if(!cur) return;
  equip[k] = null;
  const left = addItem(cur.id, 1);
  if(left>0) dropOnGround(cur.id, 1);
  refreshUI(); updateHeld();
}
function showEquipTip(k){
  const cur = equip[k];
  if(!cur){
    elTip.innerHTML = `<b>${EQUIP_SLOTS.find(e=>e.key===k).label}</b><br><i>Double-clic sur un objet équipable<br>de l'inventaire pour le porter</i>`;
  } else {
    const it = ITEMS[cur.id];
    elTip.innerHTML = `<b>${it.name}</b><br>${it.bonus}<br><i>Double-clic pour retirer</i>`;
  }
  elTip.style.display = "block";
}
function updateHeld(){
  if(held){
    elHeld.style.display = "block";
    elHeld.querySelector(".ic").style.backgroundImage = `url(${ICON[held.id]})`;
    elHeld.querySelector(".q").textContent = held.qty>1 ? held.qty : "";
  } else elHeld.style.display = "none";
}
addEventListener("pointermove", e=>{
  elHeld.style.left = (e.clientX+8)+"px";  elHeld.style.top = (e.clientY+8)+"px";
  elTip.style.left  = (e.clientX+14)+"px"; elTip.style.top  = (e.clientY+18)+"px";
});
document.getElementById("dropZone").addEventListener("click", ()=>{
  if(!held) return;
  dropOnGround(held.id, held.qty);
  held=null; updateHeld(); refreshUI();
});

function refreshUI(){
  // barre de ressources (totaux possédés)
  elBar.innerHTML = "";
  for(const [k,it] of Object.entries(ITEMS)){
    const n = countItem(k); if(n<=0) continue;
    const s = document.createElement("div"); s.className="slot";
    s.innerHTML = `<span class="sw" style="background-image:url(${ICON[k]})"></span>${n}`;
    s.title = it.name;
    elBar.appendChild(s);
  }
  // grille de slots
  [...elGrid.children].forEach((d,i)=>{
    const s = slots[i];
    d.innerHTML = s
      ? `<span class="ic" style="background-image:url(${ICON[s.id]})"></span>` + (s.qty>1?`<span class="q">${s.qty}</span>`:"")
      : "";
  });
  // compétences
  elSkills.innerHTML = "";
  for(const s of Object.values(SKILLS)){
    const need = xpNeed(s.lvl);
    const r = document.createElement("div"); r.className="skrow";
    r.innerHTML = `<span class="skname">${s.name}</span>
      <div class="skbar"><div class="skfill" style="width:${Math.min(100, s.xp/need*100)}%"></div></div>
      <span class="sklvl">niv ${s.lvl}</span>`;
    elSkills.appendChild(r);
  }
  // équipement
  for(const c of elEquip.querySelectorAll(".eqslot")){
    const cur = equip[c.dataset.k];
    c.innerHTML = cur ? `<span class="ic" style="background-image:url(${ICON[cur.id]})"></span>` : "";
    c.classList.toggle("filled", !!cur);
  }
  // stats (force, défense, vie)
  elStats.innerHTML = `<span>⚔ Force : <b>${statForce()}</b></span>
    <span>🪓 Bûcheronnage : <b>${statForceBois()}</b></span>
    <span>🛡 Défense : <b>${statDefense()}</b></span>
    <span>♥ <b>${player.hp}/${player.maxHp}</b></span>`;
  // poids
  const w = totalWeight(), wm = maxWeight();
  elWeightTxt.textContent = `${w.toFixed(1)} / ${wm}` + (w>wm ? " — surchargé !" : "");
  elWeightFill.style.width = Math.min(100, w/wm*100)+"%";
  elWeightFill.style.background = w>wm ? "#c0473f" : "#79c061";
  // recettes
  elRecipes.innerHTML = "";
  for(const rec of RECIPES){
    const r = document.createElement("div"); r.className="recipe";
    r.innerHTML = `<span class="sw" style="background-image:url(${ICON[Object.keys(rec.gives)[0]]});width:16px;height:16px"></span>
      <span><b>${rec.label}</b><br><span style="opacity:.65">${costText(rec.cost)}</span></span>`;
    const b = document.createElement("button");
    b.textContent = "Fabriquer"; b.disabled = !canCraft(rec);
    b.onclick = ()=>craft(rec);
    r.appendChild(b);
    elRecipes.appendChild(r);
  }
  // bouton "poser un feu" si on en a
  if(countItem("feu")>0){
    const r = document.createElement("div"); r.className="recipe";
    r.innerHTML = `<span>🔥 Tu as un feu de camp prêt.</span>`;
    const b = document.createElement("button");
    b.textContent = "Poser (F)";
    b.onclick = ()=>{ toggleInv(false); placeFire(); };
    r.appendChild(b);
    elRecipes.appendChild(r);
  }
}
function toggleInv(force){
  const open = force!==undefined ? force : !elInv.classList.contains("open");
  if(!open && held){   // on referme avec un objet en main : on le range (ou on le lâche)
    const left = addItem(held.id, held.qty);
    if(left>0) dropOnGround(held.id, left);
    held=null; updateHeld();
  }
  elInv.classList.toggle("open", open);
  elTip.style.display="none";
  if(open) refreshUI();
}
document.getElementById("closeInv").onclick = ()=>toggleInv(false);

/* ====================== Pré-rendu des tuiles ====================== */
function makeCanvas(w,h,draw){
  const c = document.createElement("canvas"); c.width=w; c.height=h;
  const g = c.getContext("2d"); g.imageSmoothingEnabled=false; draw(g); return c;
}
function diamondPath(g){ g.beginPath(); g.moveTo(TW/2,0); g.lineTo(TW,TH/2); g.lineTo(TW/2,TH); g.lineTo(0,TH/2); g.closePath(); }

const GRASS = ["#79c061","#6fb759","#83c96b"].map(base=>
  makeCanvas(TW,TH,g=>{
    diamondPath(g); g.fillStyle=base; g.fill();
    g.save(); diamondPath(g); g.clip();
    for(let i=0;i<26;i++){
      const x=Math.floor(rnd()*TW), y=Math.floor(rnd()*TH);
      g.fillStyle = rnd()<0.5 ? "rgba(255,255,255,0.10)" : "rgba(30,70,30,0.14)";
      g.fillRect(x,y,1,1);
    }
    g.restore();
    diamondPath(g); g.strokeStyle="rgba(40,80,40,0.25)"; g.lineWidth=1; g.stroke();
  })
);

function drawHero(g, px, py, dir, frame, walking, swing){
  const P = (x,y,w,h,c)=>{ g.fillStyle=c; g.fillRect(Math.round(px+x), Math.round(py+y), w, h); };
  const bob = walking && (frame===1||frame===3) ? -1 : 0;
  // silhouette fine façon Maori : peau hâlée, chignon (tikitiki), tatouages tā moko
  const skin="#c68a5a", skinD="#a8703f", hair="#1d1d22", moko="#6b4a33";
  const hasTorse = !!equip.torse;
  const torseC = hasTorse ? "#8a6240" : skin;
  g.fillStyle="rgba(20,40,20,0.30)";
  g.beginPath(); g.ellipse(px+5, py+15, 5, 2.2, 0, 0, 7); g.fill();

  const legA = walking ? (frame===1? -1 : frame===3? 1 : 0) : 0;
  P(3, 11+bob+ (legA<0?-1:0), 1, 3-(legA<0?-1:0), skin);     // jambes fines
  P(6, 11+bob+ (legA>0?-1:0), 1, 3-(legA>0?-1:0), skin);
  if(equip.pieds){ P(3, 12+bob, 1, 2, "#3e2d20"); P(6, 12+bob, 1, 2, "#3e2d20"); }  // bottes
  else { P(3, 13+bob, 1, 1, skinD); P(6, 13+bob, 1, 1, skinD); }                    // pieds nus

  P(2, 6+bob, 6, 4, torseC);                                  // torse nu ou tunique

const DAY_LEN = 120;                 // durée d'un cycle complet (secondes)
let dayT = DAY_LEN*0.10;             // on commence le matin
let weather = "soleil", weatherT = 35+Math.random()*25;
let rainI = 0, fogI = 0;             // intensités lissées (transitions douces)
function dayPhase(){ return (dayT%DAY_LEN)/DAY_LEN; }
function lightLevel(){               // 1 = plein jour, 0 = nuit noire
  const p = dayPhase();
  if(p<0.40) return 1;
  if(p<0.50) return 1-(p-0.40)/0.10; // crépuscule
  if(p<0.80) return 0;               // nuit
  if(p<0.95) return (p-0.80)/0.15;   // aube
  return 1;
}
function duskGlow(){                 // lueur orangée au couchant / levant
  const p = dayPhase();
  return Math.max(0, 1-Math.abs(p-0.45)/0.07) + Math.max(0, 1-Math.abs(p-0.875)/0.07);
}
function mixC(a,b,k){ return [a[0]+(b[0]-a[0])*k, a[1]+(b[1]-a[1])*k, a[2]+(b[2]-a[2])*k]; }
function cssC(c){ return `rgb(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])})`; }

function wrapText(str, maxChars){
  const words=str.split(" "); const lines=[]; let cur="";
  for(const w of words){
    if((cur+" "+w).trim().length<=maxChars) cur=(cur+" "+w).trim();
    else { if(cur) lines.push(cur); cur=w; }
  }
  if(cur) lines.push(cur); return lines;
}
function roundRect(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y); g.lineTo(x+w-r,y); g.quadraticCurveTo(x+w,y,x+w,y+r);
  g.lineTo(x+w,y+h-r); g.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  g.lineTo(x+r,y+h); g.quadraticCurveTo(x,y+h,x,y+h-r);
  g.lineTo(x,y+r); g.quadraticCurveTo(x,y,x+r,y); g.closePath();
}

function toScreen(tx,ty){ return { x:(tx-ty)*(TW/2), y:(tx+ty)*(TH/2) }; }
function isBlocked(tx,ty){
  if(tx<0.3||ty<0.3||tx>MAP-0.3||ty>MAP-0.3) return true;
  const ix=Math.floor(tx), iy=Math.floor(ty);
  return blocked[iy]?.[ix] ?? true;
}
function nearestTarget(){
  let best=null, bd=REACH;
  for(const d of decor){
    const hittable = ((d.type==="tree"||d.type==="rock") && d.alive) || d.type==="fruittree";
    if(!hittable) continue;
    const dist = Math.hypot(d.tx+0.5-player.x, d.ty+0.5-player.y);
    if(dist<bd){ bd=dist; best={kind:"decor", d}; }
  }
  for(const a of animals){
    if(a.dead) continue;
    const dist = Math.hypot(a.x-player.x, a.y-player.y);
    if(dist<bd){ bd=dist; best={kind:"animal", a}; }
  }
  for(const k of kobolds){
    if(k.dead) continue;
    const dist = Math.hypot(k.x-player.x, k.y-player.y);
    if(dist<bd){ bd=dist; best={kind:"kobold", k}; }
  }
  return best;
}
function doAction(){
  if(player.swing>0) return;
  const tgt = nearestTarget();
  player.swing = SWING_TIME;
  if(!tgt) return;
  if(tgt.kind==="animal"){ hitAnimal(tgt.a); return; }

  if(t.type==="tree"){
    t.hp -= statForceBois();

    if(t.hp<=0){

  } else {
    t.hp--;

    if(t.hp<=0){
      t.alive=false; t.regrow=55+rnd()*20; t.hp=2;

      floats.push({sx:sp.x, sy:sp.y-16, t:1.4, str:`+${n} pierre`, c:"#4a5358"});
    }
  }
}

/* ====================== Boucle de jeu ====================== */
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now-last)/1000); last = now;
  const t = now/1000;

  /* ---- mise à jour ---- */
  let sx = (keys.right?1:0)-(keys.left?1:0);
  let sy = (keys.down?1:0)-(keys.up?1:0);
  if(player.swing>0){ sx=0; sy=0; }      // réaliser une action fige le personnage
  player.walking = (sx!==0||sy!==0);
  if(player.walking){
    if(sy>0) player.dir="down"; else if(sy<0) player.dir="up";
    if(sx<0) player.dir="left"; else if(sx>0) player.dir="right";
    let dx = (sx+sy), dy = (sy-sx);
    const len = Math.hypot(dx,dy)||1; dx/=len; dy/=len;
    const spd = SPEED * (overweight()?0.5:1) * (boostT>0?1.3:1) * (equip.pieds?1.15:1);
    const nx = player.x + dx*spd*dt;
    const ny = player.y + dy*spd*dt;
    if(!isBlocked(nx, player.y)) player.x = nx;
    if(!isBlocked(player.x, ny)) player.y = ny;
    player.animT += dt;
  } else player.animT = 0;
  const frame = Math.floor(player.animT*8)%4;

  if(actionQueued){ actionQueued=false; doAction(); }
  if(player.swing>0) player.swing = Math.max(0, player.swing-dt);
  if(boostT>0) boostT = Math.max(0, boostT-dt);
  if(player.hurtT>0) player.hurtT = Math.max(0, player.hurtT-dt);

  // repousse des arbres / rochers / fruits
  for(const d of decor){
    if(d.shake>0) d.shake = Math.max(0, d.shake-dt);
    if(d.type==="fruittree" && d.fruits<3){
      d.regrowF -= dt;
      if(d.regrowF<=0){
        d.fruits++;
        d.regrowF = 12 + rnd()*10;
        if(d.fruits===3){
          const sp = toScreen(d.tx+0.5, d.ty+0.5);
          burst(sp.x, sp.y-26, FRUIT_KINDS[d.kind].fc, 5);
        }
      }
    }
    if((d.type==="tree"||d.type==="rock") && !d.alive){
      d.regrow -= dt;
      if(d.regrow<=0){
        // ne repousse pas sur le joueur
        if(Math.floor(player.x)===d.tx && Math.floor(player.y)===d.ty){ d.regrow=1; }
        else {
          d.alive=true; blocked[d.ty][d.tx]=true;
          const sp = toScreen(d.tx+0.5, d.ty+0.5);
          burst(sp.x, sp.y-10, "#67bd72", 8);
        }
      }
    }
  }
  // animaux : errance, fuite, réapparition
  for(const a of animals){
    if(a.hurtT>0) a.hurtT = Math.max(0, a.hurtT-dt);
    if(a.dead){ a.respawn-=dt; if(a.respawn<=0) resetAnimal(a); continue; }
    const T = ANIMAL_TYPES[a.type];
    const pd = Math.hypot(player.x-a.x, player.y-a.y);
    const fleeR = T.flee * (equip.tete ? 0.65 : 1);   // chapeau de plumes : plus discret
    if(a.atkCd>0) a.atkCd -= dt;
    const scared = a.hp <= Math.ceil(T.hp*0.35);      // blessé : il préfère fuir
    if(pd < fleeR && a.state!=="charge"){
      if(T.aggressive && !scared && a.atkCd<=0){ a.state="charge"; a.t=5; }
      else { a.state="flee"; a.t = Math.max(a.t, 0.6); }
    }
    if(a.state==="charge" && scared){ a.state="flee"; a.t=2.5; }
    if(a.state==="charge"){
      a.t -= dt;
      const ang = Math.atan2(player.y-a.y, player.x-a.x);
      a.vx = Math.cos(ang)*T.speed*1.25; a.vy = Math.sin(ang)*T.speed*1.25;
      if(pd<0.7 && player.hurtT<=0 && a.atkCd<=0){
        const dmg = Math.max(1, (T.dmg||2) - statDefense());
        player.hp -= dmg; player.hurtT = 1.2;
        const ps2 = toScreen(player.x, player.y);
        floats.push({sx:ps2.x, sy:ps2.y-26, t:1.2, str:`-${dmg} PV`, c:"#c0473f"});
        burst(ps2.x, ps2.y-10, "#c0473f", 8);
        // recul du joueur
        const kx = player.x + Math.cos(ang)*0.9, ky = player.y + Math.sin(ang)*0.9;
        if(!isBlocked(kx, player.y)) player.x = kx;
        if(!isBlocked(player.x, ky)) player.y = ky;
        a.atkCd = 3;                                   // il souffle avant de réattaquer
        a.state="idle"; a.t=2.2; a.vx=a.vy=0;
        if(player.hp<=0){                              // K.O. : retour au camp
          player.hp = player.maxHp; player.hurtT = 2.5;
          player.x = spawn.x; player.y = spawn.y;
          const ps3 = toScreen(spawn.x, spawn.y);
          floats.push({sx:ps3.x, sy:ps3.y-30, t:2.2, str:"Assommé ! Retour au camp…", c:"#8a3030"});
          for(const an of animals) if(an.state==="charge"){ an.state="idle"; an.t=2; an.vx=an.vy=0; }
        }
        if(elInv.classList.contains("open")) refreshUI();
      } else if(a.t<=0 || pd>9){ a.state="idle"; a.t=1+Math.random()*2; a.vx=a.vy=0; }
    } else if(a.state==="flee"){
      a.t -= dt;
      const ang = Math.atan2(a.y-player.y, a.x-player.x);
      a.vx = Math.cos(ang)*T.speed; a.vy = Math.sin(ang)*T.speed;
      if(a.t<=0 && pd>fleeR+1){ a.state="idle"; a.t=1+Math.random()*2; a.vx=a.vy=0; }
    } else if(a.state==="wander"){
      a.t -= dt;
      if(a.t<=0){ a.state="idle"; a.t=1+Math.random()*3; a.vx=a.vy=0; }
    } else {
      a.t -= dt;
      if(a.t<=0){
        a.state="wander"; a.t=0.8+Math.random()*1.5;
        const ang = Math.random()*6.28;
        a.vx = Math.cos(ang)*T.speed*0.45; a.vy = Math.sin(ang)*T.speed*0.45;
      }
    }
    if(a.vx||a.vy){
      const nx2=a.x+a.vx*dt, ny2=a.y+a.vy*dt;
      if(!isBlocked(nx2,a.y)) a.x=nx2; else a.vx*=-0.7;
      if(!isBlocked(a.x,ny2)) a.y=ny2; else a.vy*=-0.7;
      a.animT += dt;
      const sdx = a.vx - a.vy;             // direction horizontale à l'écran (iso)
      if(Math.abs(sdx)>0.05) a.flip = sdx<0;
    }
  }
  // kobolds : patrouille, détection, charge, fuite
  for(const k of kobolds){
    if(k.hurtT>0) k.hurtT=Math.max(0,k.hurtT-dt);
    if(k.alertT>0) k.alertT-=dt;
    if(k.dead){ k.respawn-=dt; continue; }
    const T=KOBOLD_TYPES[k.type];
    const pd=Math.hypot(player.x-k.x, player.y-k.y);
    if(k.alertT>0 && k.state==="charge"){
      for(const k2 of kobolds){
        if(k2===k||k2.dead) continue;
        if(Math.hypot(k2.x-k.x,k2.y-k.y)<4 && k2.state==="patrol"){ k2.state="charge"; k2.t=5; }
      }
    }
    if(pd<T.detect && k.state==="patrol"){
      k.state="charge"; k.t=6; k.alertT=3;
      const ks=toScreen(k.x,k.y);
      floats.push({sx:ks.x, sy:ks.y-14, t:0.9, str:"*hrrrk*", c:"#5a3a5a"});
      if(!raka.visible){ raka.visible=true; }
    }
    if(k.state==="flee"){
      k.t-=dt;
      const ang=Math.atan2(k.y-player.y, k.x-player.x);
      k.vx=Math.cos(ang)*T.speed*0.8; k.vy=Math.sin(ang)*T.speed*0.8;
      if(k.t<=0 && pd>T.detect+2){ k.state="patrol"; k.t=2+Math.random()*2; k.vx=k.vy=0; }
    } else if(k.state==="charge"){
      k.t-=dt;
      const ang=Math.atan2(player.y-k.y, player.x-k.x);
      k.vx=Math.cos(ang)*T.speed; k.vy=Math.sin(ang)*T.speed;
      k.atkCd=Math.max(0,k.atkCd-dt);
      if(pd<0.75 && player.hurtT<=0 && k.atkCd<=0){
        const dmg=Math.max(1, T.dmg-statDefense());
        player.hp-=dmg; player.hurtT=1.2;
        const ps2=toScreen(player.x,player.y);
        floats.push({sx:ps2.x, sy:ps2.y-26, t:1.2, str:`-${dmg} PV`, c:"#c0473f"});
        burst(ps2.x, ps2.y-10, "#c0473f", 8);
        const kx=player.x+Math.cos(ang)*0.8, ky=player.y+Math.sin(ang)*0.8;
        if(!isBlocked(kx,player.y)) player.x=kx;
        if(!isBlocked(player.x,ky)) player.y=ky;
        k.atkCd=2.5;
        if(!raka.emerged){
          raka.emerged=true; raka.visible=true;
          spiritSay("raka","Je suis Raka. Méfie-toi de leurs griffes.", 5);
        }
        if(player.hp<=0){
          player.hp=player.maxHp; player.hurtT=2.5;
          player.x=spawn.x; player.y=spawn.y;
          const ps3=toScreen(spawn.x,spawn.y);
          floats.push({sx:ps3.x, sy:ps3.y-30, t:2.2, str:"Assommé ! Retour au camp…", c:"#8a3030"});
          for(const kk of kobolds) if(kk.state==="charge"){ kk.state="patrol"; kk.t=2; kk.vx=kk.vy=0; }
        }
        if(elInv.classList.contains("open")) refreshUI();
      }
      if(k.t<=0 || pd>T.detect+4){ k.state="patrol"; k.t=2+Math.random()*3; k.vx=k.vy=0; }
    } else {
      k.t-=dt; k.atkCd=Math.max(0,k.atkCd-dt);
      if(k.t<=0){
        const ang=Math.random()*6.28;
        k.patrolTx=k.x+Math.cos(ang)*3+Math.random()*2;
        k.patrolTy=k.y+Math.sin(ang)*3+Math.random()*2;
        k.t=2+Math.random()*3;
      }
      const ddx=k.patrolTx-k.x, ddy=k.patrolTy-k.y, d2=Math.hypot(ddx,ddy);
      if(d2>0.2){ k.vx=(ddx/d2)*T.speed*0.4; k.vy=(ddy/d2)*T.speed*0.4; }
      else { k.vx=0; k.vy=0; }
    }
    if(k.vx||k.vy){
      const nx2=k.x+k.vx*dt, ny2=k.y+k.vy*dt;
      if(!isBlocked(nx2,k.y)) k.x=nx2; else k.vx*=-0.5;
      if(!isBlocked(k.x,ny2)) k.y=ny2; else k.vy*=-0.5;
      k.animT+=dt;
      const sdx=k.vx-k.vy; if(Math.abs(sdx)>0.05) k.flip=sdx<0;
    }
  }

  // respawn kobolds (hors boucle pour éviter splice pendant for..of)
  for(let i=kobolds.length-1;i>=0;i--){
    if(kobolds[i].dead && kobolds[i].respawn<=0){ const tp=kobolds[i].type; kobolds.splice(i,1); spawnKobold(tp); }
  }

  // esprits de la nature
  {
    // Ao suit le joueur en orbite douce
    if(ao.visible){
      const targX=player.x+Math.cos(t*0.7)*1.9, targY=player.y+Math.sin(t*0.5)*1.2-0.6;
      ao.x+=(targX-ao.x)*Math.min(1,dt*2.5);
      ao.y+=(targY-ao.y)*Math.min(1,dt*2.5);
      ao.ph+=dt;
      if(Math.random()<dt*10){ const sp=toScreen(ao.x,ao.y); ao.trail.push({sx:sp.x,sy:sp.y-18,t:0.7,maxT:0.7}); }
      ao.cooldown-=dt; ao.talkTimer-=dt;
      if(ao.cooldown<=0 && ao.talkTimer<=0 && !spiritBubbles.some(b=>b.speaker==="ao")){
        if(!ao.seenBois && countItem("bois")<1){
          spiritSay("ao","Coupe un arbre. Le bois est la base de tout craft.",5); ao.seenBois=true; ao.cooldown=25;
        } else if(!ao.seenPlanche && countItem("bois")>=2 && countItem("planche")<1){
          spiritSay("ao","Tu as du bois ! Ouvre l'inventaire (I) et fabrique des planches.",5); ao.seenPlanche=true; ao.cooldown=20;
        } else if(!ao.seenFeu && countItem("planche")>=2 && countItem("pierre")>=2){
          spiritSay("ao","Planches et pierre — tu peux crafter un feu de camp. Pose-le avec F.",5); ao.seenFeu=true; ao.cooldown=20;
        } else if(player.hp<=player.maxHp*0.4){
          spiritSay("ao","Tu es blessé. Mange un fruit pour récupérer.",4); ao.cooldown=15;
        } else if(kobolds.some(k=>!k.dead && Math.hypot(k.x-player.x,k.y-player.y)<10)){
          spiritSay("ao","Des kobolds rôdent dans cette direction.",4); ao.cooldown=18;
        }
        if(ao.cooldown>0) ao.talkTimer=ao.cooldown+10;
      }
    }
    for(let i=ao.trail.length-1;i>=0;i--){ ao.trail[i].t-=dt; if(ao.trail[i].t<=0) ao.trail.splice(i,1); }

    // Raka : radar kobold, se positionne entre joueur et danger
    if(raka.visible){
      raka.ph+=dt*1.4;
      let nearestK=null, nearestDist=999;
      for(const k of kobolds){ if(k.dead) continue; const d2=Math.hypot(k.x-player.x,k.y-player.y); if(d2<nearestDist){nearestDist=d2;nearestK=k;} }
      if(nearestK && nearestDist<14){
        const ang=Math.atan2(nearestK.y-player.y, nearestK.x-player.x);
        raka.targetX=player.x+Math.cos(ang)*2.5; raka.targetY=player.y+Math.sin(ang)*2.5;
        if(nearestDist<5 && raka.cooldown<=0 && !spiritBubbles.some(b=>b.speaker==="raka")){
          spiritSay("raka", nearestDist<3?"Attention ! Il est sur toi !":"Un kobold à portée. Garde tes distances.",3);
          raka.cooldown=9;
        }
      } else {
        raka.targetX=player.x-2.5; raka.targetY=player.y-2.5;
      }
      raka.x+=(raka.targetX-raka.x)*Math.min(1,dt*3);
      raka.y+=(raka.targetY-raka.y)*Math.min(1,dt*3);
      raka.cooldown=Math.max(0,raka.cooldown-dt);
      if(Math.random()<dt*9){ const sp=toScreen(raka.x,raka.y); raka.trail.push({sx:sp.x,sy:sp.y-15,t:0.5,maxT:0.5}); }
    }
    for(let i=raka.trail.length-1;i>=0;i--){ raka.trail[i].t-=dt; if(raka.trail[i].t<=0) raka.trail.splice(i,1); }
    for(let i=spiritBubbles.length-1;i>=0;i--){ spiritBubbles[i].t-=dt; if(spiritBubbles[i].t<=0) spiritBubbles.splice(i,1); }
  }

  // ramassage des objets au sol
  for(let i=groundItems.length-1;i>=0;i--){
    const g = groundItems[i];
    if(g.cool>0){ g.cool-=dt; continue; }
    if(Math.hypot(g.x-player.x, g.y-player.y)<0.7){
      const left = addItem(g.id, g.qty);
      const got = g.qty - left;
      if(got>0){
        const sp = toScreen(g.x, g.y);
        floats.push({sx:sp.x, sy:sp.y-14, t:1.1, str:`+${got} ${ITEMS[g.id].name.toLowerCase()}`, c:"#5f4128"});
        refreshUI();
      }
      if(left>0){ g.qty=left; g.cool=2; }   // inventaire plein : on réessaiera
      else groundItems.splice(i,1);
    }
  }
  // particules & textes
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.t-=dt; p.sx+=p.vx*dt; p.sy+=p.vy*dt; p.vy+=140*dt;
    if(p.t<=0) particles.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.t-=dt; f.sy-=14*dt;
    if(f.t<=0) floats.splice(i,1);
  }
  // papillons
  for(const b of butterflies){
    b.a += (Math.sin(t*0.7+b.ph))*0.8*dt*3;
    b.x += Math.cos(b.a)*0.8*dt; b.y += Math.sin(b.a)*0.8*dt;
    if(b.x<2||b.x>MAP-2) b.a = Math.PI - b.a;
    if(b.y<2||b.y>MAP-2) b.a = -b.a;
  }
  for(const c of clouds){ c.x += c.v*dt; if(c.x>LW+260) c.x=-260; }

  // météo & cycle jour/nuit
  dayT += dt;
  weatherT -= dt;
  if(weatherT<=0){
    const others = ["soleil","pluie","brume"].filter(w=>w!==weather);
    weather = others[Math.floor(Math.random()*others.length)];
    weatherT = 30 + Math.random()*35;
  }
  rainI += ((weather==="pluie"?1:0)-rainI)*Math.min(1, dt/2.5);
  fogI  += ((weather==="brume"?1:0)-fogI)*Math.min(1, dt/2.5);
  const light = lightLevel();
  if(rainI>0.02) for(const d of drops){
    d.y += d.s*dt; d.x -= d.s*0.25*dt;
    if(d.y>LH){ d.y = -6; d.x = Math.random()*(LW+60); }
  }
  for(const f of fogs){ f.x += f.v*dt; if(f.x>LW+120) f.x = -180; }
  for(const fl of fireflies){
    fl.a += Math.sin(t*0.9+fl.ph)*1.2*dt;
    fl.x += Math.cos(fl.a)*0.6*dt; fl.y += Math.sin(fl.a)*0.6*dt;
    if(fl.x<2||fl.x>MAP-2) fl.a = Math.PI-fl.a;
    if(fl.y<2||fl.y>MAP-2) fl.a = -fl.a;
  }
  if(light>0.7 && rainI<0.4 && Math.random()<dt*7){
    // étincelles seulement autour de la caméra
    sparkles.push({tx:player.x+(Math.random()-0.5)*28, ty:player.y+(Math.random()-0.5)*28, t:0.8, max:0.8});
  }
  for(let i=sparkles.length-1;i>=0;i--){ sparkles[i].t-=dt; if(sparkles[i].t<=0) sparkles.splice(i,1); }
  const lbl = `${light>0.65?"☀ jour":light>0.15?(dayPhase()<0.6?"🌇 crépuscule":"🌄 aube"):"🌙 nuit"} · ${weather==="soleil"?"ciel dégagé":weather}`;
  if(elMeteo.textContent!==lbl) elMeteo.textContent = lbl;

  // caméra
  const ps = toScreen(player.x, player.y);
  const targX = ps.x - LW/2, targY = ps.y - LH/2 - 8;
  if(!camInit){ camX=targX; camY=targY; camInit=true; }
  camX += (targX-camX)*Math.min(1, dt*6);
  camY += (targY-camY)*Math.min(1, dt*6);
  const ox = Math.round(-camX), oy = Math.round(-camY);

  /* ---- rendu ---- */
  // ciel interpolé jour / crépuscule / nuit, grisé sous la pluie
  const duskK = Math.min(1, duskGlow());
  let topC = mixC([16,22,48],[168,220,236], light);
  let botC = mixC([40,54,82],[231,243,207], light);
  topC = mixC(topC,[244,150,90], duskK*0.6); botC = mixC(botC,[232,200,122], duskK*0.45);
  topC = mixC(topC,[110,120,134], rainI*0.55); botC = mixC(botC,[146,154,162], rainI*0.5);
  const sky = cx.createLinearGradient(0,0,0,LH);
  sky.addColorStop(0,cssC(topC)); sky.addColorStop(1,cssC(botC));
  cx.fillStyle = sky; cx.fillRect(0,0,LW,LH);
  // soleil ou lune en arc dans le ciel
  const ph2 = dayPhase();
  if(ph2<0.52){
    const u = Math.min(1, ph2/0.5);
    const sxp = 26+(LW-52)*u, syp = 64-Math.sin(u*Math.PI)*40;
    cx.fillStyle="rgba(255,236,150,0.35)"; cx.beginPath(); cx.arc(sxp,syp,9,0,7); cx.fill();
    cx.fillStyle="#ffe27a"; cx.beginPath(); cx.arc(sxp,syp,5,0,7); cx.fill();
    cx.fillStyle="#fff3bd"; cx.fillRect(sxp-2,syp-2,2,2);
  } else if(ph2<0.97){
    const u = (ph2-0.52)/0.45;
    const mxp = 26+(LW-52)*u, myp = 60-Math.sin(Math.min(1,u)*Math.PI)*36;
    cx.fillStyle="rgba(230,238,255,0.85)"; cx.beginPath(); cx.arc(mxp,myp,5,0,7); cx.fill();
    cx.fillStyle = cssC(topC); cx.beginPath(); cx.arc(mxp+2,myp-1,4,0,7); cx.fill();
  }
  cx.save(); cx.globalAlpha = 0.35+0.65*light;
  for(const c of clouds){
    cx.save(); cx.translate(Math.round(c.x + ox*0.15), Math.round(c.y + oy*0.1));
    cx.scale(c.s,c.s); cx.drawImage(CLOUD,0,0); cx.restore();
  }
  cx.restore();

  const wf = Math.floor(t*2)%2;
  // caméra restreinte : on ne parcourt que la fenêtre de tuiles visibles à l'écran
  const ulo = (-ox-TW)/(TW/2),     uhi = (LW-ox+TW/2)/(TW/2);   // u = x-y
  const vlo = (-oy-TH-14)/(TH/2),  vhi = (LH-oy)/(TH/2);        // v = x+y
  const xlo = Math.max(0, Math.floor((ulo+vlo)/2)), xhi = Math.min(MAP-1, Math.ceil((uhi+vhi)/2));
  const ylo = Math.max(0, Math.floor((vlo-uhi)/2)), yhi = Math.min(MAP-1, Math.ceil((vhi-ulo)/2));
  for(let y=ylo;y<=yhi;y++)for(let x=xlo;x<=xhi;x++){
    const s = toScreen(x,y);
    const dx = s.x+ox-TW/2, dy = s.y+oy;
    if(dx<-TW||dx>LW||dy<-TH-12||dy>LH) continue;
    const g = ground[y][x];
    cx.drawImage(g===3 ? WATER[wf] : g===4 ? SAND : GRASS[g], dx, dy);
  }

  // surbrillance de la cible à portée
  const target = nearestTarget();
  if(target && target.kind==="decor"){
    const s = toScreen(target.d.tx, target.d.ty);
    cx.save();
    cx.translate(s.x+ox-TW/2, s.y+oy);
    cx.beginPath(); cx.moveTo(TW/2,0); cx.lineTo(TW,TH/2); cx.lineTo(TW/2,TH); cx.lineTo(0,TH/2); cx.closePath();
    cx.strokeStyle = `rgba(255,244,200,${0.55+0.3*Math.sin(t*6)})`;
    cx.lineWidth = 1; cx.stroke();
    cx.restore();
  } else if(target){
    const s = toScreen(target.a.x, target.a.y);
    cx.beginPath(); cx.ellipse(Math.round(s.x+ox), Math.round(s.y+oy)+1, 8, 3.5, 0, 0, 7);
    cx.strokeStyle = `rgba(255,180,150,${0.6+0.3*Math.sin(t*6)})`;
    cx.lineWidth = 1; cx.stroke();
  }

  // entités triées — seules celles proches de l'écran sont retenues (culling)
  const vis = (tx,ty)=>{
    const s = toScreen(tx,ty), sx2 = s.x+ox, sy2 = s.y+oy;
    return sx2>-70 && sx2<LW+70 && sy2>-80 && sy2<LH+40;
  };
  const ents = [];
  for(const d of decor) if(vis(d.tx+0.5, d.ty+0.5)) ents.push({depth:d.tx+d.ty, d});
  ents.push({depth:player.x+player.y, d:{type:"hero"}});
  for(const g of groundItems) if(vis(g.x,g.y)) ents.push({depth:g.x+g.y+0.005, d:{type:"gitem", g}});
  for(const a of animals) if(!a.dead && vis(a.x,a.y)) ents.push({depth:a.x+a.y, d:{type:"animal", a}});
  for(const k of kobolds) if(!k.dead && vis(k.x,k.y)) ents.push({depth:k.x+k.y+0.002, d:{type:"kobold", k}});
  for(const b of butterflies) if(vis(b.x,b.y)) ents.push({depth:b.x+b.y+0.01, d:{type:"bf", b}});
  ents.sort((a,b)=>a.depth-b.depth);

  for(const e of ents){
    const d = e.d;
    if(d.type==="hero"){
      if(player.hurtT>0 && Math.floor(t*16)%2) cx.globalAlpha=0.5;
      drawHero(cx, Math.round(ps.x+ox-5), Math.round(ps.y+oy-12), player.dir, frame, player.walking, player.swing/SWING_TIME);
      cx.globalAlpha=1;
    } else if(d.type==="bf"){
      const b=d.b, s=toScreen(b.x,b.y);
      const fl = Math.floor(t*10+b.ph)%2;
      const bx=Math.round(s.x+ox), by=Math.round(s.y+oy-14+Math.sin(t*2+b.ph)*3);
      cx.fillStyle=b.c;
      if(fl){ cx.fillRect(bx-2,by,2,2); cx.fillRect(bx+1,by,2,2); }
      else  { cx.fillRect(bx-1,by-1,1,2); cx.fillRect(bx+1,by-1,1,2); }
      cx.fillStyle="#2b2026"; cx.fillRect(bx,by,1,2);
    } else if(d.type==="gitem"){
      const g2=d.g, s=toScreen(g2.x, g2.y);
      const gx=Math.round(s.x+ox), gy=Math.round(s.y+oy);
      const bob=Math.round(Math.sin(t*3+g2.ph)*1.5);
      cx.fillStyle="rgba(20,40,20,0.25)";
      cx.beginPath(); cx.ellipse(gx, gy+1, 4, 1.6, 0, 0, 7); cx.fill();
      cx.drawImage(ICON_SRC[g2.id], gx-5, gy-11+bob, 10, 10);
    } else if(d.type==="animal"){
      const a=d.a, s=toScreen(a.x, a.y);
      const img = ANIMAL_IMG[a.type][(a.vx||a.vy) ? Math.floor(a.animT*10)%2 : 0];
      const axp = Math.round(s.x+ox), ayp = Math.round(s.y+oy);
      cx.fillStyle="rgba(20,40,20,0.25)";
      cx.beginPath(); cx.ellipse(axp, ayp+1, img.width/2-1, 2.2, 0, 0, 7); cx.fill();
      cx.save();
      cx.translate(axp, ayp);
      if(a.flip) cx.scale(-1,1);
      if(a.hurtT>0 && Math.floor(t*16)%2) cx.globalAlpha=0.45;
      cx.drawImage(img, -Math.round(img.width/2), -img.height+2);
      cx.restore();
    } else if(d.type==="kobold"){
      const k=d.k, TK=KOBOLD_TYPES[k.type];
      const s=toScreen(k.x,k.y);
      const img=KOBOLD_IMG[k.type][(k.vx||k.vy)?Math.floor(k.animT*10)%2:0];
      const kxp=Math.round(s.x+ox), kyp=Math.round(s.y+oy);
      cx.fillStyle="rgba(10,5,20,0.35)";
      cx.beginPath(); cx.ellipse(kxp, kyp+1, img.width/2, 2.5, 0, 0, 7); cx.fill();
      cx.save(); cx.translate(kxp, kyp);
      if(k.flip) cx.scale(-1,1);
      if(k.hurtT>0 && Math.floor(t*16)%2) cx.globalAlpha=0.4;
      cx.drawImage(img, -Math.round(img.width/2), -img.height+2);
      cx.restore();
      // barre de vie
      const hpFrac=k.hp/TK.hp, bw=img.width+4;
      cx.fillStyle="rgba(0,0,0,0.55)"; cx.fillRect(kxp-bw/2-1, kyp-TK.h-3, bw+2, 4);
      cx.fillStyle=hpFrac>0.5?"#5db858":hpFrac>0.25?"#e8a030":"#c0473f";
      cx.fillRect(kxp-bw/2, kyp-TK.h-2, Math.max(0,Math.round(bw*hpFrac)), 2);
    } else {
      const s = toScreen(d.tx+0.5, d.ty+0.5);
      const shk = d.shake>0 ? Math.round(Math.sin(d.shake*40)*1.5) : 0;
      const bx = s.x+ox+shk, by = s.y+oy;
      if(d.type==="tree"){
        if(d.alive) cx.drawImage(TREE_IMG[d.v], Math.round(bx-20), Math.round(by-46));
        else cx.drawImage(STUMP, Math.round(bx-8), Math.round(by-8));
      }
      else if(d.type==="fruittree"){
        cx.drawImage(FRUIT_TREES_IMG[d.kind], Math.round(bx-20), Math.round(by-46));
        const fc = FRUIT_KINDS[d.kind].fc;
        for(let i=0;i<d.fruits;i++){
          const fx = Math.round(bx-20+FRUIT_POS[i][0]), fy = Math.round(by-46+FRUIT_POS[i][1]);
          cx.fillStyle=fc; cx.fillRect(fx,fy,3,3);
          cx.fillStyle="rgba(255,255,255,.45)"; cx.fillRect(fx,fy,1,1);
        }
      }
      else if(d.type==="rock"){
        if(d.alive) cx.drawImage(ROCKS[d.v], Math.round(bx-11), Math.round(by-9));
        else cx.drawImage(PEBBLES, Math.round(bx-9), Math.round(by-5));
      }
      else if(d.type==="fire"){
        const fx = Math.round(bx), fy = Math.round(by);
        // halo
        const fl2 = 0.85+0.15*Math.sin(t*9+d.ph);
        const deep = Math.max(0, 1-light*2);          // ne s'intensifie qu'en pleine nuit
        cx.fillStyle = `rgba(255,190,90,${(0.13+0.18*deep)*fl2})`;
        cx.beginPath(); cx.ellipse(fx, fy-2, (18+8*deep)*fl2, (9+3*deep)*fl2, 0, 0, 7); cx.fill();
        // pierres autour
        cx.fillStyle="#9aa2a6";
        cx.fillRect(fx-8,fy-1,3,2); cx.fillRect(fx+5,fy-1,3,2);
        cx.fillRect(fx-4,fy+2,3,2); cx.fillRect(fx+1,fy+2,3,2);
        cx.fillRect(fx-2,fy-4,2,2); cx.fillRect(fx+1,fy-4,2,2);
        // bûches
        cx.fillStyle="#5f4128"; cx.fillRect(fx-5,fy-2,10,2);
        // flammes (2 images)
        const ff = Math.floor(t*8+d.ph)%2;
        cx.fillStyle="#e8743f";
        if(ff){ cx.fillRect(fx-3,fy-7,6,5); cx.fillRect(fx-1,fy-9,3,2); }
        else  { cx.fillRect(fx-2,fy-8,5,6); cx.fillRect(fx-3,fy-5,7,3); }
        cx.fillStyle="#f4c542";
        if(ff){ cx.fillRect(fx-1,fy-5,3,3); } else { cx.fillRect(fx-1,fy-6,2,4); }
        // étincelle
        if(Math.floor(t*4+d.ph)%3===0){ cx.fillStyle="#ffd98a"; cx.fillRect(fx+(ff?2:-3), fy-12, 1,1); }
      }
      else if(d.type==="flower"){
        const sw = Math.round(Math.sin(t*2+d.ph)*1.2);
        const fx = Math.round(bx+d.ox), fy = Math.round(by+d.oy);
        cx.fillStyle="#3f8f4f"; cx.fillRect(fx, fy-4, 1, 4);
        cx.fillStyle=d.c; cx.fillRect(fx-1+sw, fy-7, 3, 3);
        cx.fillStyle="#fff6d8"; cx.fillRect(fx+sw, fy-6, 1, 1);
      } else if(d.type==="tuft"){
        const sw = Math.round(Math.sin(t*1.7+d.ph)*1.2);
        const fx = Math.round(bx+d.ox), fy = Math.round(by+d.oy);
        cx.fillStyle="#5fae4e";
        cx.fillRect(fx, fy-3, 1, 3);
        cx.fillRect(fx-2+sw, fy-4, 1, 4);
        cx.fillRect(fx+2+sw, fy-4, 1, 4);
      }
    }
  }

  // particules
  for(const p of particles){
    cx.fillStyle = p.c;
    cx.fillRect(Math.round(p.sx+ox), Math.round(p.sy+oy), 2, 2);
  }

  // esprits (rendu additif, au-dessus de tout)
  cx.save(); cx.globalCompositeOperation="lighter";
  if(ao.visible){
    for(const pt of ao.trail){
      cx.globalAlpha=pt.t/pt.maxT*0.55;
      cx.fillStyle="#39d353"; cx.fillRect(Math.round(pt.sx+ox)-1, Math.round(pt.sy+oy)-1, 2, 2);
    }
    const sp=toScreen(ao.x,ao.y), axp=Math.round(sp.x+ox), ayp=Math.round(sp.y+oy-18);
    const pulse=0.75+0.25*Math.sin(t*3+ao.ph);
    cx.globalAlpha=pulse; cx.drawImage(SPIRIT_GLOW_AO, axp-18, ayp-18);
  }
  if(raka.visible){
    for(const pt of raka.trail){
      cx.globalAlpha=pt.t/pt.maxT*0.45;
      cx.fillStyle="#c0473f"; cx.fillRect(Math.round(pt.sx+ox)-1, Math.round(pt.sy+oy)-1, 2, 2);
    }
    const sp=toScreen(raka.x,raka.y), rxp=Math.round(sp.x+ox), ryp=Math.round(sp.y+oy-16);
    const nearKob=kobolds.some(k=>!k.dead&&Math.hypot(k.x-player.x,k.y-player.y)<5);
    const pulse=nearKob?0.65+0.35*Math.sin(t*8):0.6+0.2*Math.sin(t*2+raka.ph);
    cx.globalAlpha=pulse; cx.drawImage(SPIRIT_GLOW_RAKA, rxp-18, ryp-18);
  }
  cx.restore(); cx.globalAlpha=1;
  // noyaux des esprits
  if(ao.visible){
    const sp=toScreen(ao.x,ao.y), axp=Math.round(sp.x+ox), ayp=Math.round(sp.y+oy-18);
    cx.fillStyle="#c0ffc8"; cx.fillRect(axp-1,ayp-1,3,3);
    cx.fillStyle="#ffffff"; cx.fillRect(axp,ayp-1,1,1);
  }
  if(raka.visible){
    const sp=toScreen(raka.x,raka.y), rxp=Math.round(sp.x+ox), ryp=Math.round(sp.y+oy-16);
    cx.fillStyle="#ffb0a0"; cx.fillRect(rxp-1,ryp-1,3,3);
    cx.fillStyle="#ffffff"; cx.fillRect(rxp,ryp-1,1,1);
  }
  // bulles de dialogue des esprits
  for(const b of spiritBubbles){
    const spirit = b.speaker==="ao" ? ao : raka;
    const sp=toScreen(spirit.x,spirit.y);
    const bxp=Math.round(sp.x+ox), byp=Math.round(sp.y+oy-(b.speaker==="ao"?34:30));
    const alpha=Math.min(1, b.t/0.5);
    const lines=wrapText(b.msg, 24);
    const bh=lines.length*10+8;
    const bw=Math.max(...lines.map(l=>l.length*5.5))+12;
    const bgC=b.speaker==="ao"?"rgba(15,40,18,0.92)":"rgba(45,10,8,0.92)";
    const borderC=b.speaker==="ao"?"#39d353":"#c0473f";
    const textC=b.speaker==="ao"?"#a0ffb0":"#ffb0a0";
    cx.save(); cx.globalAlpha=alpha;
    cx.fillStyle=bgC;
    roundRect(cx, bxp-bw/2, byp-bh, bw, bh, 4); cx.fill();
    cx.strokeStyle=borderC; cx.lineWidth=1;
    roundRect(cx, bxp-bw/2, byp-bh, bw, bh, 4); cx.stroke();
    cx.fillStyle=bgC;
    cx.beginPath(); cx.moveTo(bxp-3,byp); cx.lineTo(bxp+3,byp); cx.lineTo(bxp,byp+5); cx.closePath(); cx.fill();
    cx.strokeStyle=borderC; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(bxp-3,byp); cx.lineTo(bxp,byp+5); cx.lineTo(bxp+3,byp); cx.stroke();
    cx.font="bold 7px 'Courier New', monospace"; cx.textAlign="left"; cx.fillStyle=textC;
    lines.forEach((line,i)=>{ cx.fillText(line, bxp-bw/2+5, byp-bh+9+i*10); });
    cx.restore();
  }
  cx.textAlign="center";

  /* ---- ambiance : lumière & météo ---- */
  // rayons de soleil obliques en plein jour
  const rayA = Math.max(0,(light-0.3)/0.7)*(1-rainI)*(1-fogI*0.6);   // s'éteint dès le soir
  if(rayA>0.03){
    cx.save(); cx.globalCompositeOperation="lighter";
    for(let i=0;i<4;i++){
      const a = rayA*(0.045+0.035*Math.sin(t*0.45+i*1.9));
      if(a<=0.005) continue;
      const x0 = ((i*140 + t*7)%(LW+300))-150;
      cx.fillStyle = `rgba(255,246,200,${a})`;
      cx.beginPath();
      cx.moveTo(x0,0); cx.lineTo(x0+46,0); cx.lineTo(x0-64,LH); cx.lineTo(x0-118,LH);
      cx.closePath(); cx.fill();
    }
    cx.restore();
  }
  // brillances scintillantes (jour)
  for(const s of sparkles){
    const sp2 = toScreen(s.tx, s.ty);
    const sxp = Math.round(sp2.x+ox), syp = Math.round(sp2.y+oy);
    if(sxp<2||sxp>LW-2||syp<2||syp>LH-2) continue;
    const k = Math.sin(Math.PI*(1-s.t/s.max));
    cx.globalAlpha = k*0.85*light;
    cx.fillStyle="#ffffff";
    cx.fillRect(sxp-2,syp,5,1); cx.fillRect(sxp,syp-2,1,5);
    cx.fillStyle="#fff7c8"; cx.fillRect(sxp,syp,1,1);
    cx.globalAlpha = 1;
  }
  // pluie
  if(rainI>0.02){
    cx.strokeStyle = `rgba(200,218,240,${0.65*rainI})`;
    cx.lineWidth = 1;
    cx.beginPath();
    for(const d of drops){ cx.moveTo(d.x, d.y); cx.lineTo(d.x-2.2, d.y+9); }
    cx.stroke();
    cx.fillStyle = `rgba(70,82,104,${0.14*rainI})`;
    cx.fillRect(0,0,LW,LH);
  }
  // brume
  if(fogI>0.02){
    cx.save(); cx.globalAlpha = fogI*0.8;
    for(const f of fogs){ cx.save(); cx.translate(f.x,f.y); cx.scale(f.s,f.s); cx.drawImage(FOG,-70,-22); cx.restore(); }
    cx.restore();
    cx.fillStyle = `rgba(222,229,233,${0.10*fogI})`;
    cx.fillRect(0,0,LW,LH);
  }
  // lueur du crépuscule / de l'aube
  if(duskK>0.02){ cx.fillStyle=`rgba(255,138,64,${0.07*duskK})`; cx.fillRect(0,0,LW,LH); }
  // voile de nuit
  if(light<0.98){
    cx.fillStyle = `rgba(16,24,58,${0.46*(1-light)})`;
    cx.fillRect(0,0,LW,LH);
  }
  // lucioles luisantes (glow additif) — uniquement en pleine nuit
  if(light<0.25){
    cx.save(); cx.globalCompositeOperation="lighter";
    for(const fl of fireflies){
      const s2 = toScreen(fl.x, fl.y);
      const fx2 = Math.round(s2.x+ox), fy2 = Math.round(s2.y+oy-10+Math.sin(t*1.6+fl.ph)*4);
      if(fx2<-20||fx2>LW+20||fy2<-20||fy2>LH+20) continue;   // hors champ
      const a = (1-light*4)*(0.35+0.45*Math.sin(t*2.6+fl.ph));
      if(a<=0.03) continue;
      cx.globalAlpha = Math.max(0, Math.min(1, a));
      cx.drawImage(GLOW, fx2-12, fy2-12);
      cx.fillStyle="#f4ffb0"; cx.fillRect(fx2, fy2, 1, 1);
    }
    cx.restore(); cx.globalAlpha = 1;
  }
  // textes flottants
  cx.textAlign="center"; cx.font="bold 9px 'Courier New', monospace";
  for(const f of floats){
    const a = Math.min(1, f.t/0.4);
    cx.fillStyle = "rgba(255,255,255,"+(0.85*a)+")";
    cx.fillText(f.str, Math.round(f.sx+ox), Math.round(f.sy+oy)+1);
    cx.fillStyle = f.c.startsWith("#") ? f.c : f.c;
    cx.globalAlpha = a;
    cx.fillText(f.str, Math.round(f.sx+ox), Math.round(f.sy+oy));
    cx.globalAlpha = 1;
  }

  // cœurs de vie (coin haut gauche)
  for(let i=0;i<player.maxHp/2;i++){
    const seg = player.hp - i*2;
    const img = seg>=2 ? HEARTS.full : seg>=1 ? HEARTS.half : HEARTS.empty;
    cx.drawImage(img, 6+i*10, 6);
  }

  requestAnimationFrame(loop);
}
refreshUI();
requestAnimationFrame(loop);
</script>
</body>
</html>
