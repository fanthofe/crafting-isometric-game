<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>La Plaine — petit jeu isométrique</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <h1>LA PLAINE</h1>
  <p>Flèches / ZQSD : marcher · E ou Espace : couper / cueillir / chasser · I : inventaire · F : poser un feu</p>
  <p id="meteo"></p>
</div>
<div id="bar"></div>

<div id="inv">
  <button id="closeInv">✕</button>
  <h2>INVENTAIRE</h2>
  <div id="grid"></div>
  <div id="weightRow"><span>⚖</span><div id="weightBar"><div id="weightFill"></div></div><span id="weightTxt"></span></div>
  <div id="dropZone">🗑 Jeter au sol l'objet tenu</div>
  <h3>ÉQUIPEMENT</h3>
  <div id="equipRow"></div>
  <div id="statsRow"></div>
  <h3>COMPÉTENCES</h3>
  <div id="skills"></div>
  <h3>FABRICATION</h3>
  <div id="invRecipes"></div>
  <div class="hint">Clic : prendre / poser · Clic droit : moitié / un seul · Double-clic : manger / équiper</div>
</div>
<div id="held"><span class="ic"></span><span class="q"></span></div>
<div id="tip"></div>

<div id="dpad">
  <div class="db empty"></div><div class="db" data-d="up">▲</div><div class="db empty"></div>
  <div class="db" data-d="left">◀</div><div class="db empty"></div><div class="db" data-d="right">▶</div>
  <div class="db empty"></div><div class="db" data-d="down">▼</div><div class="db empty"></div>
</div>
<div id="touchBtns">
  <button class="tb" id="btnAct">🪓</button>
  <button class="tb" id="btnInv">🎒</button>
</div>

<!--
  Les scripts sont chargés dans l'ordre de leurs dépendances : chaque fichier
  partage la portée globale, comme l'ancien script unique, mais découpé par rôle.
-->
<script src="js/config.js"></script>
<script src="js/world.js"></script>
<script src="js/items.js"></script>
<script src="js/inventory.js"></script>
<script src="js/ui.js"></script>
<script src="js/sprites.js"></script>
<script src="js/kobolds.js"></script>
<script src="js/hero.js"></script>
<script src="js/effects.js"></script>
<script src="js/spirits.js"></script>
<script src="js/input.js"></script>
<script src="js/world-logic.js"></script>
<script src="js/game.js"></script>
</body>
</html>
